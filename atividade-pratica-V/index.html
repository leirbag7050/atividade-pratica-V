<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <link rel="stylesheet" href="css/pico.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <title>Login</title>

    <style>
      .container {
        max-width: 400px;
        margin: 0 auto;
        padding: 20px;
      }

      .campo {
        margin-bottom: 16px;
      }

      .campo label {
        display: block;
        margin-bottom: 6px;
        font-size: 14px;
        font-weight: 500;
      }

      .campo input[type="email"],
      .campo input[type="password"] {
        width: 100%;
        padding: 8px 10px;
        box-sizing: border-box;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 14px;
      }

      .lembrar {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 16px;
        font-size: 14px;
      }

      .cadastrar{
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      input[type="submit"],
      .botao_cadastrar {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 4px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        text-align: center;
        transition: background-color 0.15s;
        box-sizing: border-box;
      }

      input[type="submit"] {
        background-color: #007bff;
        color: white;
      }

      input[type="submit"]:hover {
        background-color: #0056b3;
      }

      .botao_cadastrar {
        background-color: #6c757d;
        color: white;
        display: block;
        text-decoration: none;
      }

      .botao_cadastrar:hover {
        background-color: #5a6268;
        color: white;
      }

      .esqueci_senha {
        margin-top: 12px;
        font-size: 14px;
        text-align: center;
      }
    </style>
  </head>

  <body>
    <main class="container">
      <h1>Login</h1>

      <form method="get" action="feed.html">

        <div class="campo">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>

        <div class="campo">
          <label for="password">Senha</label>
          <input type="password" id="password" name="password" required>
        </div>

        <div class="lembrar">
          <input type="checkbox" id="lembrar_me" name="lembrar_me">
          <label for="lembrar_me">Lembrar-me</label>
        </div>

        <div class="cadastrar">
          <input type="submit" value="Entrar">
          <a href="cadastro.html" class="botao_cadastrar">Cadastrar</a>
        </div>

        <p class="esqueci_senha">
          <a href="esqueci-senha.html">Esqueci minha senha</a>
        </p>

      </form>
    </main>
  </body>
</html>
